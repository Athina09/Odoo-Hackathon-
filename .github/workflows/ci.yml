name: CI

on:
  push:
    branches: [main, mobile/ecosphere]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -c "from main import app; from seed_data import SEED_VERSION; print(SEED_VERSION)"
      - run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 2
          curl -sf http://127.0.0.1:8000/api/health
          curl -sf "http://127.0.0.1:8000/api/rag/search?query=manufacturing"
          curl -sf http://127.0.0.1:8000/api/mobile/bootstrap/EMP005
